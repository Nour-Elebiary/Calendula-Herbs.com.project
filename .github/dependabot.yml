version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Africa/Cairo
    versioning-strategy: increase
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      radix-ui:
        patterns:
          - '@radix-ui/*'
        update-types:
          - minor
          - patch
      framer-motion:
        patterns:
          - 'framer-motion'
        update-types:
          - minor
          - patch
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
        update-types:
          - minor
          - patch
      prisma:
        patterns:
          - '@prisma/*'
          - 'prisma'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Africa/Cairo
